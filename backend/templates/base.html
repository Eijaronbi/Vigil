<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Message Monitor{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #f5f5f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        nav { background: #111; border-bottom: 1px solid #222; padding: 16px 0; }
        nav .container { display: flex; align-items: center; gap: 32px; }
        nav a { color: #888; text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.2s; }
        nav a:hover { color: #a78bfa; }
        main { padding: 32px 0; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 24px; }
        .card h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #f5f5f0; }
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; text-decoration: none; }
        .btn-primary { background: #a78bfa; color: #000; }
        .btn-primary:hover { background: #b99cfb; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-danger:hover { background: #f87171; }
        .btn-outline { background: transparent; border: 1px solid #333; color: #f5f5f0; }
        .btn-outline:hover { border-color: #a78bfa; color: #a78bfa; }
        input, select, textarea { background: #0a0a0a; border: 1px solid #333; border-radius: 8px; padding: 10px 14px; color: #f5f5f0; font-size: 14px; width: 100%; outline: none; transition: border-color 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: #a78bfa; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px 16px; font-size: 12px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #222; }
        td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #1a1a1a; }
        tr:hover td { background: rgba(167, 139, 250, 0.04); }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .badge-telegram { background: rgba(0, 136, 204, 0.2); color: #0088cc; }
        .badge-whatsapp { background: rgba(37, 211, 102, 0.2); color: #25d366; }
        .badge-twitter { background: rgba(29, 161, 242, 0.2); color: #1da1f2; }
        .badge-gmail { background: rgba(234, 67, 53, 0.2); color: #ea4335; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .stat-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 24px; }
        .stat-card .value { font-size: 36px; font-weight: 700; color: #a78bfa; }
        .stat-card .label { font-size: 13px; color: #666; margin-top: 4px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: #888; margin-bottom: 6px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .empty-state { text-align: center; padding: 48px 24px; color: #555; }
        .empty-state p { font-size: 15px; }
        .highlight-important { border-left: 3px solid #a78bfa; }
        .score { font-weight: 600; }
        .score-high { color: #a78bfa; }
        .score-medium { color: #fbbf24; }
        .score-low { color: #666; }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" style="font-weight: 700; color: #a78bfa; font-size: 16px;">MsgMonitor</a>
            <a href="/">Dashboard</a>
            <a href="/groups">Groups</a>
            <a href="/rules">Rules</a>
            <a href="/messages">Messages</a>
        </div>
    </nav>
    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
